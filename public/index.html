<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRS Safety Dashboard</title>
<style>
  :root{
    --grs:#EC4B32; --grs-dark:#C53A23; --grs-soft:#fdece8;
    --ink:#17150f; --muted:#6f685d; --faint:#9a9388;
    --line:#e7e2d9; --paper:#f4f1ea; --card:#ffffff;
    --ok:#2f7d4f; --okbg:#e9f4ee; --warn:#b6852a; --warnbg:#fbf2dd;
    --bad:#c0392b; --badbg:#fbeae7;
    --slab:#23211b;
    --shadow:0 1px 2px rgba(23,21,15,.04),0 10px 30px rgba(23,21,15,.06);
    --mono:"IBM Plex Mono",ui-monospace,"SFMono-Regular",Menlo,monospace;
    --rail:248px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;}
  body{background:var(--paper);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;}

  .app{display:grid;grid-template-columns:var(--rail) 1fr;min-height:100vh;}

  /* Sidebar */
  .rail{background:var(--slab);color:#cfc9bd;position:sticky;top:0;height:100vh;
    display:flex;flex-direction:column;}
  .rail-brand{padding:22px 22px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
  .rail-brand img{height:34px;width:auto;display:block;margin-bottom:12px;}
  .rail-brand .t{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em;}
  .rail-brand .s{font-size:11px;color:#8e8779;margin-top:1px;}
  nav{padding:14px 12px;flex:1;}
  .nav-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:#7a7367;font-weight:700;padding:12px 12px 8px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;
    cursor:pointer;color:#cfc9bd;font-size:14px;font-weight:500;transition:.12s;
    border:1px solid transparent;}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
  .nav-item.active{background:var(--grs);color:#fff;border-color:var(--grs);font-weight:600;}
  .nav-item .ic{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;}
  .nav-item .ct{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:700;
    background:rgba(255,255,255,.1);padding:2px 7px;border-radius:20px;color:inherit;}
  .nav-item.active .ct{background:rgba(255,255,255,.22);}
  .rail-foot{padding:16px 22px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#8e8779;}
  .rail-foot .live{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);
    font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#cfc9bd;}
  .rail-foot .dot{width:6px;height:6px;border-radius:50%;background:#8e8779;}

  /* Main */
  main{overflow-x:hidden;}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(244,241,234,.86);
    backdrop-filter:saturate(160%) blur(8px);border-bottom:1px solid var(--line);
    padding:18px 34px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .topbar h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.02em;}
  .topbar .crumb{font-size:12px;color:var(--muted);margin-top:1px;}
  .ctrls select{font-family:inherit;font-size:13px;border:1px solid var(--line);
    background:#fff;border-radius:8px;padding:8px 11px;color:var(--ink);font-weight:600;}
  .view{padding:28px 34px 70px;max-width:1160px;}

  .burger{display:none;background:none;border:none;cursor:pointer;padding:6px;}
  .burger svg{width:24px;height:24px;stroke:var(--ink);fill:none;stroke-width:2;}
  @media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .rail{position:fixed;left:0;top:0;width:var(--rail);z-index:50;transform:translateX(-100%);
      transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.3);}
    .rail.open{transform:translateX(0);}
    .burger{display:block;}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;}
    .scrim.show{display:block;}
    .view,.topbar{padding-left:20px;padding-right:20px;}
  }

  .sec{margin-bottom:30px;}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:15px;}
  .sec-head h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);font-weight:700;margin:0;}
  .sec-head .rule{flex:1;height:1px;background:var(--line);align-self:center;}

  .grid{display:grid;gap:16px;}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g2{grid-template-columns:1.5fr 1fr;}
  .g2e{grid-template-columns:1fr 1fr;}
  @media(max-width:860px){.g4,.g2,.g2e{grid-template-columns:1fr;}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:20px 22px;box-shadow:var(--shadow);}
  .card h3{margin:0 0 4px;font-size:15px;font-weight:700;}
  .card .cap{font-size:12px;color:var(--muted);margin:0 0 16px;}

  .stat{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:18px 20px;box-shadow:var(--shadow);}
  .stat .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);
    font-weight:700;margin-bottom:10px;}
  .stat .v{font-size:34px;font-weight:800;line-height:1;letter-spacing:-.03em;
    font-variant-numeric:tabular-nums;}
  .stat .v .u{font-size:16px;font-weight:600;color:var(--faint);}
  .stat .foot{font-size:12px;color:var(--muted);margin-top:8px;}
  .stat.accent .v{color:var(--grs);}
  .miniline{height:5px;border-radius:3px;background:var(--paper);margin-top:12px;overflow:hidden;}
  .miniline span{display:block;height:100%;border-radius:3px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--faint);font-weight:700;padding:0 10px 10px;border-bottom:1px solid var(--line);}
  th.num,td.num{text-align:right;font-variant-numeric:tabular-nums;}
  td{padding:13px 10px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  tbody tr{transition:background .12s;}
  tbody tr:hover{background:var(--paper);}
  .site-name{font-weight:600;}
  .site-meta{font-size:11.5px;color:var(--faint);margin-top:1px;}

  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
    padding:4px 9px;border-radius:20px;font-family:var(--mono);letter-spacing:.02em;}
  .pill.ok{background:var(--okbg);color:var(--ok);}
  .pill.warn{background:var(--warnbg);color:var(--warn);}
  .pill.bad{background:var(--badbg);color:var(--bad);}
  .bar{height:7px;border-radius:4px;background:var(--paper);overflow:hidden;min-width:80px;}
  .bar span{display:block;height:100%;border-radius:4px;}

  .finding{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);}
  .finding:last-child{border-bottom:none;}
  .sev-tag{flex-shrink:0;width:64px;font-size:10px;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;padding:5px 0;text-align:center;border-radius:6px;height:fit-content;}
  .sev-tag.c{background:var(--badbg);color:var(--bad);}
  .sev-tag.major{background:var(--warnbg);color:var(--warn);}
  .sev-tag.minor{background:var(--okbg);color:var(--ok);}
  .finding .title{font-weight:600;font-size:14px;}
  .finding .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap;}
  .finding .meta .due{font-family:var(--mono);}
  .finding .meta .over{color:var(--bad);font-weight:600;}

  .matrix .mrow{display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:8px;
    align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .matrix .mrow:last-child{border-bottom:none;}
  .matrix .mhead{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--faint);font-weight:700;border-bottom:1px solid var(--line);padding-bottom:9px;}
  .matrix .mhead>div{text-align:center;}
  .matrix .mhead>div:first-child{text-align:left;}
  .cell{text-align:center;font-family:var(--mono);font-size:12px;font-weight:700;
    padding:5px 0;border-radius:6px;}
  .cell.full{background:var(--okbg);color:var(--ok);}
  .cell.part{background:var(--warnbg);color:var(--warn);}
  .cell.gap{background:var(--badbg);color:var(--bad);}
  .crew{font-weight:600;}
  .crew small{display:block;color:var(--faint);font-weight:400;font-size:11px;}

  .doc{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .doc:last-child{border-bottom:none;}
  .doc .ico{width:34px;height:34px;border-radius:8px;background:var(--paper);
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);
    font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;}
  .doc .dn{flex:1;}
  .doc .dn .t{font-weight:600;font-size:13.5px;}
  .doc .dn .s{font-size:11.5px;color:var(--faint);margin-top:1px;}
  .doc .status{font-size:11px;font-family:var(--mono);font-weight:700;}

  /* Site pack */
  .pack{background:var(--card);border:1px solid var(--line);border-radius:13px;
    box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
  .pack-head{display:flex;align-items:center;gap:16px;padding:16px 20px;cursor:pointer;
    transition:background .12s;}
  .pack-head:hover{background:var(--paper);}
  .pack-head .chev{transition:transform .2s;color:var(--faint);font-size:13px;}
  .pack.open .chev{transform:rotate(90deg);}
  .pack-title{flex:1;}
  .pack-title .n{font-weight:700;font-size:15px;}
  .pack-title .r{font-size:11.5px;color:var(--faint);font-family:var(--mono);margin-top:1px;}
  .pack-prog{display:flex;align-items:center;gap:10px;min-width:160px;}
  .pack-prog .bar{flex:1;}
  .pack-prog .pct{font-family:var(--mono);font-size:12px;font-weight:700;}
  .pack-body{display:none;padding:0 20px 8px;border-top:1px solid var(--line);}
  .pack.open .pack-body{display:block;}
  .pitem{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .pitem:last-child{border-bottom:none;}
  .pitem .pico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;
    justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
  .pitem .pn{flex:1;font-size:13.5px;font-weight:500;}
  .pitem .pn small{display:block;color:var(--faint);font-weight:400;font-size:11px;margin-top:1px;}
  .tick{font-size:11px;font-family:var(--mono);font-weight:700;padding:3px 9px;border-radius:6px;}
  .tick.ok{background:var(--okbg);color:var(--ok);}
  .tick.warn{background:var(--warnbg);color:var(--warn);}
  .tick.bad{background:var(--badbg);color:var(--bad);}

  .haz{display:inline-flex;gap:4px;}
  .hz{width:22px;height:22px;border-radius:5px;display:inline-flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:800;font-family:var(--mono);}
  .hz.flam{background:#fdebd0;color:#b9770e;}
  .hz.tox{background:#fbeae7;color:#b03a2e;}
  .hz.irr{background:#fef9e7;color:#9a7d0a;}
  .hz.env{background:#eafaf1;color:#1e8449;}
</style>

<style>
  .btn-primary{background:var(--grs);color:#fff;border:none;padding:9px 16px;border-radius:9px;
    font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
  .btn-primary:hover{background:var(--grs-dark);}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);padding:9px 14px;
    border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn-ghost:hover{background:var(--paper);}
  .btn-sm{font-size:11px;padding:5px 11px;border-radius:7px;font-weight:700;cursor:pointer;
    border:1px solid var(--line);background:#fff;font-family:inherit;color:var(--muted);}
  .btn-sm:hover{border-color:var(--grs);color:var(--grs);}
  .userchip{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
  .userchip b{color:var(--ink);font-weight:600;}
  .userchip .out{font-size:11px;cursor:pointer;color:var(--grs);font-weight:700;}
  .finding .act{margin-left:auto;display:flex;gap:7px;align-items:flex-start;}
  .modal-bg{position:fixed;inset:0;background:rgba(23,21,15,.5);z-index:100;display:none;
    align-items:center;justify-content:center;padding:20px;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:460px;padding:26px 26px 22px;
    box-shadow:0 30px 80px rgba(0,0,0,.4);}
  .modal h3{margin:0 0 18px;font-size:17px;}
  .modal label{display:block;font-size:12px;font-weight:700;margin:0 0 6px;}
  .modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1px solid var(--line);
    border-radius:9px;font-size:14px;font-family:inherit;margin-bottom:14px;}
  .modal textarea{resize:vertical;min-height:64px;}
  .modal-act{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
  .preview{padding:60px 20px;text-align:center;}
  .preview .pin{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;background:var(--warnbg);color:var(--warn);padding:5px 12px;
    border-radius:20px;display:inline-block;margin-bottom:16px;}
  .preview h3{font-size:20px;margin:0 0 8px;}
  .preview p{color:var(--muted);max-width:420px;margin:0 auto;font-size:14px;}
  .loading{padding:50px;text-align:center;color:var(--faint);font-size:14px;}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line);
    border-top-color:var(--grs);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--slab);
    color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;
    opacity:0;transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>

</head>
<body>
<div class="app">
  <aside class="rail" id="rail">
    <div class="rail-brand">
      <img id="logo" alt="GRS Contractors Ltd">
      <div class="t">Safety Dashboard</div>
      <div class="s">GRS Contractors Ltd</div>
    </div>
    <nav id="nav">
      <div class="nav-label">Overview</div>
      <div class="nav-item active" data-view="overview">
        <svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-label">Modules</div>
      <div class="nav-item" data-view="audits">
        <svg class="ic" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Audits <span class="ct" id="ct-audits"></span>
      </div>
      <div class="nav-item" data-view="training">
        <svg class="ic" viewBox="0 0 24 24"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.5 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>
        Training <span class="ct" style="opacity:.5">soon</span>
      </div>
      <div class="nav-item" data-view="rams">
        <svg class="ic" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h6"/></svg>
        RAMS <span class="ct" style="opacity:.5">soon</span>
      </div>
      <div class="nav-item" data-view="coshh">
        <svg class="ic" viewBox="0 0 24 24"><path d="M9 2h6M10 2v6l-4.5 9A2 2 0 0 0 7.3 20h9.4a2 2 0 0 0 1.8-2.9L14 8V2"/></svg>
        COSHH <span class="ct" style="opacity:.5">soon</span>
      </div>
      <div class="nav-label">Sites</div>
      <div class="nav-item" data-view="packs">
        <svg class="ic" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg>
        Site packs <span class="ct" style="opacity:.5">soon</span>
      </div>
    </nav>
    <div class="rail-foot">
      <div class="live"><span class="dot" style="background:#7fd1a0"></span>Live</div>
      <div style="margin-top:6px">Oversight by Safety Simplified Ltd</div>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main>
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="burger" id="burger"><svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        <div>
          <h1 id="viewTitle">Dashboard</h1>
          <div class="crumb" id="viewCrumb">Safety overview · all active sites</div>
        </div>
      </div>
      <div class="userchip">
        <span>Signed in as <b id="who">—</b></span>
        <span class="out" id="logout">Sign out</span>
      </div>
    </div>
    <div class="view" id="view"><div class="loading"><span class="spin"></span></div></div>
  </main>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script src="/logo.js"></script>
<script src="/app.js"></script>
</body>
</html>
